<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup – Vigil</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #07090f; color: #e2e8f0; }
    .eye-glow { filter: drop-shadow(0 0 12px rgba(99,102,241,0.4)); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="fixed inset-0 pointer-events-none" style="background-image: linear-gradient(#1c2033 1px, transparent 1px), linear-gradient(90deg, #1c2033 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3;"></div>
  <div class="fixed inset-0 pointer-events-none" style="background: radial-gradient(ellipse 60% 60% at 50% 50%, transparent 0%, #07090f 70%);"></div>

  <div class="relative w-full max-w-sm">

    <div class="flex flex-col items-center mb-8">
      <div class="eye-glow mb-4">
        <svg width="64" height="64" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 16C2 16 7 6 16 6C25 6 30 16 30 16C30 16 25 26 16 26C7 26 2 16 2 16Z"
                fill="rgba(99,102,241,0.15)" stroke="#818cf8" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="6" fill="#6366f1"/>
          <circle cx="16" cy="16" r="3" fill="#312e81"/>
          <circle cx="18.5" cy="13.5" r="2" fill="white" opacity="0.45"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Vigil</h1>
      <p class="text-slate-600 text-sm mt-1">Initial Setup</p>
    </div>

    <div class="bg-[#0c0e1a] border border-[#1c2033] rounded-2xl p-7 shadow-2xl">
      <h2 class="text-base font-semibold text-white mb-0.5">Welcome</h2>
      <p class="text-slate-600 text-xs mb-6">Configure your Vigil instance to get started.</p>

      <form method="post" action="/setup/complete" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Site name</label>
          <input type="text" name="site_name" value="Vigil"
                 class="w-full px-3 py-2.5 bg-[#07090f] border border-[#1c2033] rounded-lg text-white text-sm
                        focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/20 transition-all">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Admin username</label>
          <input type="text" name="username" value="admin" required autocomplete="username"
                 class="w-full px-3 py-2.5 bg-[#07090f] border border-[#1c2033] rounded-lg text-white text-sm
                        focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/20 transition-all">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Admin password</label>
          <input type="password" name="password" required minlength="6" autocomplete="new-password"
                 class="w-full px-3 py-2.5 bg-[#07090f] border border-[#1c2033] rounded-lg text-white text-sm
                        focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/20 transition-all"
                 placeholder="Minimum 6 characters">
        </div>
        <button type="submit"
                class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
                       text-white text-sm font-medium rounded-lg transition-all mt-1
                       focus:outline-none focus:ring-2 focus:ring-indigo-500/40">
          Get started
        </button>
      </form>
    </div>

  </div>
</body>
</html>
