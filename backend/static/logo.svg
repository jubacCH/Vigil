<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="irisGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="eyeStroke" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Outer ring (subtle) -->
  <circle cx="60" cy="60" r="56" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <!-- Eye shape -->
  <path d="M8 60C8 60 28 22 60 22C92 22 112 60 112 60C112 60 92 98 60 98C28 98 8 60 8 60Z"
        fill="rgba(99,102,241,0.10)" stroke="url(#eyeStroke)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Iris -->
  <circle cx="60" cy="60" r="22" fill="url(#irisGrad)" filter="url(#glow)"/>
  <!-- Pupil -->
  <circle cx="60" cy="60" r="11" fill="#312e81"/>
  <!-- Highlight -->
  <circle cx="68" cy="52" r="6" fill="white" opacity="0.35"/>
  <circle cx="69" cy="53" r="2.5" fill="white" opacity="0.5"/>
</svg>
